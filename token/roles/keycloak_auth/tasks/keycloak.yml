---
- name: Hämtar Keycloak admin-token
  ansible.builtin.uri:
    url: "http://localhost:{{ keycloak_http_port }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ keycloak_admin_user }}"
      password: "{{ keycloak_admin_password }}"
      grant_type: password
      client_id: admin-cli
    status_code: 200
  register: keycloak_token

- name: Kontrollerar om LDAP-federation redan finns
  ansible.builtin.uri:
    url: "http://localhost:{{ keycloak_http_port }}/admin/realms/{{ keycloak_realm }}/components?type=org.keycloak.storage.UserStorageProvider"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_token.json.access_token }}"
    status_code: 200
  register: ldap_components

- name: Skapar LDAP User Federation
  ansible.builtin.uri:
    url: "http://localhost:{{ keycloak_http_port }}/admin/realms/{{ keycloak_realm }}/components"
    method: POST
    headers:
      Authorization: "Bearer {{ keycloak_token.json.access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: openldap
      providerId: ldap
      providerType: org.keycloak.storage.UserStorageProvider
      config:
        enabled: ["true"]
        priority: ["0"]
        fullSyncPeriod: ["-1"]
        changedSyncPeriod: ["-1"]
        cachePolicy: ["DEFAULT"]
        batchSizeForSync: ["1000"]
        editMode: ["READ_ONLY"]
        importEnabled: ["true"]
        syncRegistrations: ["false"]
        vendor: ["other"]
        usernameLDAPAttribute: ["uid"]
        rdnLDAPAttribute: ["uid"]
        uuidLDAPAttribute: ["entryUUID"]
        userObjectClasses: ["inetOrgPerson, posixAccount"]
        connectionUrl: ["ldap://openldap:389"]
        usersDn: ["ou=users,dc={{ ldap_domain.split('.')[0] }},dc={{ ldap_domain.split('.')[1] }}"]
        authType: ["simple"]
        bindDn: ["cn=readonly,dc={{ ldap_domain.split('.')[0] }},dc={{ ldap_domain.split('.')[1] }}"]
        bindCredential: ["{{ ldap_readonly_password }}"]
        searchScope: ["1"]
        validatePasswordPolicy: ["false"]
        trustEmail: ["true"]
        useTruststoreSpi: ["ldapsOnly"]
        connectionPooling: ["true"]
        pagination: ["true"]
        allowKerberosAuthentication: ["false"]
        useKerberosForPasswordAuthentication: ["false"]
    status_code: 201
  when: ldap_components.json | length == 0

- name: Hämtar LDAP-komponentens ID
  ansible.builtin.uri:
    url: "http://localhost:{{ keycloak_http_port }}/admin/realms/{{ keycloak_realm }}/components?type=org.keycloak.storage.UserStorageProvider"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_token.json.access_token }}"
    status_code: 200
  register: ldap_components_updated

- name: Synkroniserar användare från LDAP
  ansible.builtin.uri:
    url: "http://localhost:{{ keycloak_http_port }}/admin/realms/{{ keycloak_realm }}/user-storage/{{ ldap_components_updated.json[0].id }}/sync?action=triggerFullSync"
    method: POST
    headers:
      Authorization: "Bearer {{ keycloak_token.json.access_token }}"
    status_code: 200

- name: Hämtar jitsi-client ID
  ansible.builtin.uri:
    url: "http://localhost:{{ keycloak_http_port }}/admin/realms/{{ keycloak_realm }}/clients?clientId={{ keycloak_client_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_token.json.access_token }}"
    status_code: 200
  register: keycloak_clients

- name: Hämtar client secret
  ansible.builtin.uri:
    url: "http://localhost:{{ keycloak_http_port }}/admin/realms/{{ keycloak_realm }}/clients/{{ keycloak_clients.json[0].id }}/client-secret"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_token.json.access_token }}"
    status_code: 200
  register: client_secret_result
  when: keycloak_clients.json | length > 0

- name: Sätter client_secret som fact
  ansible.builtin.set_fact:
    keycloak_client_secret: "{{ client_secret_result.json.value }}"
  when: keycloak_clients.json | length > 0

- name: Uppdaterar adapter-containern med rätt client secret
  ansible.builtin.shell:
    cmd: >
      {{ container_system }} compose up -d --force-recreate adapter
    chdir: "{{ keycloak_auth_working_dir }}"
  become_user: "{{ docker_user }}"
  when: keycloak_client_secret != ""

- name: Visar client secret
  ansible.builtin.debug:
    msg: "Keycloak client secret: {{ keycloak_client_secret }}"
  when: keycloak_client_secret != ""
