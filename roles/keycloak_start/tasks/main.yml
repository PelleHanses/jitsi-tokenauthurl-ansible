---
- name: Tar bort gamla Prosody-kontofiler så de återskapas
  ansible.builtin.file:
    path: "{{ keycloak_auth_working_dir }}/{{ item }}"
    state: absent
  loop:
    - prosody/config/data/auth%2emeet%2ejitsi/accounts/focus.dat
    - prosody/config/data/auth%2emeet%2ejitsi/accounts/jvb.dat

- name: Startar OpenLDAP
  ansible.builtin.shell:
    cmd: "{{ container_system }} compose up -d openldap"
    chdir: "{{ keycloak_auth_working_dir }}"
  become_user: "{{ docker_user }}"

- name: Väntar på att OpenLDAP laddar användare
  ansible.builtin.shell:
    cmd: >
      {{ container_system }} exec openldap
      ldapsearch -x -H ldap://localhost:389
      -D "cn=admin,dc={{ ldap_domain.split('.')[0] }},dc={{ ldap_domain.split('.')[1] }}"
      -w "{{ ldap_admin_password }}"
      -b "dc={{ ldap_domain.split('.')[0] }},dc={{ ldap_domain.split('.')[1] }}"
      "(objectClass=inetOrgPerson)" dn
  register: ldap_check
  until: ldap_check.rc == 0 and 'dn:' in ldap_check.stdout
  retries: 20
  delay: 5
  become_user: "{{ docker_user }}"

- name: Startar Keycloak
  ansible.builtin.shell:
    cmd: "{{ container_system }} compose up -d keycloak"
    chdir: "{{ keycloak_auth_working_dir }}"
  become_user: "{{ docker_user }}"

- name: Väntar på att Keycloak svarar
  ansible.builtin.uri:
    url: "http://localhost:{{ keycloak_http_port }}/realms/master"
    status_code: 200
  register: keycloak_check
  until: keycloak_check.status == 200
  retries: 40
  delay: 5

- name: Extra väntetid för att Keycloak ska bli helt redo
  ansible.builtin.pause:
    seconds: 5

- name: Startar adapter och Nginx
  ansible.builtin.shell:
    cmd: "{{ container_system }} compose up -d adapter nginx {% if phpldapadmin_enabled %}phpldapadmin{% endif %}"
    chdir: "{{ keycloak_auth_working_dir }}"
  become_user: "{{ docker_user }}"
