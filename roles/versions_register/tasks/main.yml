- name: Registrerar versioner - Moduler
  ansible.builtin.copy:
    content: "{{ item.version }}\n"
    dest: "{{ remote_working_directory }}/{{ org_name }}/versions/{{ item.name }}_version.info"
  loop:
    - { name: "{{ jitsi_web_info }}", version: "{{ web_version }}" }
    - { name: "{{ jitsi_prosody_info }}", version: "{{ prosody_version }}" }
    - { name: "{{ jitsi_jvb_info }}", version: "{{ jvb_version }}" }
    - { name: "{{ jitsi_jicofo_info }}", version: "{{ jicofo_version }}" }
    - { name: "{{ nginx_info }}", version: "{{ nginx_version }}" }
    - { name: "{{ keycloak_info }}", version: "{{ keycloak_version }}" }
    - { name: "{{ php_info }}", version: "{{ php_version }}" }
    - { name: "{{ jitsi_keycloak_adapter_v2_info }}", version: "{{ jitsi_keycloak_adapter_v2_version }}" }
  become_user: "{{ podman_user }}"

