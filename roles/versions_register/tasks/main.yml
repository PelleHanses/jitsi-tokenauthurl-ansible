---
- name: Skapa katalog för versionsfiler
  file:
    path: "{{ remote_working_directory }}/{{ org_name }}/versions"
    state: directory
    mode: "0755"
  become_user: "{{ podman_user }}"

- name: Registrerar versioner - Jitsi
  ansible.builtin.copy:
    content: "{{ jitsi_version }}\n"
    dest: "{{ remote_working_directory }}/{{ org_name }}/versions/{{ service_name }}.info"
  become_user: "{{ podman_user }}"

