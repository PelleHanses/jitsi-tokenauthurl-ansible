# ── SSL-certifikat ────────────────────────────────────────────────────────────
# Generera self-signed om inget cert finns – byt ut mot riktigt cert i prod.
- name: Kontrollera om SSL-certifikat redan finns
  ansible.builtin.stat:
    path: "{{ remote_working_directory }}/{{ org_name }}/nginx/ssl/jitsi.crt"
  register: ssl_cert_stat

- name: Generera self-signed SSL-certifikat
  ansible.builtin.command:
    cmd: >
      openssl req -x509 -nodes -days 365
      -newkey rsa:2048
      -keyout {{ remote_working_directory }}/{{ org_name }}/nginx/ssl/jitsi.key
      -out    {{ remote_working_directory }}/{{ org_name }}/nginx/ssl/jitsi.crt
      -subj "/CN={{ jitsi_public_hostname }}"
  when: not ssl_cert_stat.stat.exists
    #notify: Restart nginx'
  become_user: "{{ podman_user }}"

- name: Sätt rättigheter på SSL-filer
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0600"
  loop:
    - "{{ remote_working_directory }}/{{ org_name }}/nginx/ssl/jitsi.crt"
    - "{{ remote_working_directory }}/{{ org_name }}/nginx/ssl/jitsi.key"
  when: not ssl_cert_stat.stat.exists

# ── docker-compose för nginx ───────────────────────────────────────────
- name: Deploya docker-compose-proxy.yml
  ansible.builtin.template:
    src: docker-compose-nginx.yml.j2
    dest: "{{ remote_working_directory }}/docker-compose-proxy.yml"
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0644"
      #notify: Restart nginx
  become_user: "{{ podman_user }}"

