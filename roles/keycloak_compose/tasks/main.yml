---
- name: Skapar .env-fil
  ansible.builtin.template:
    src: env.j2
    dest: "{{ keycloak_auth_working_dir }}/.env"
    owner: "{{ docker_user }}"
    mode: "0600"

- name: Skapar docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ keycloak_auth_working_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    mode: "0644"
