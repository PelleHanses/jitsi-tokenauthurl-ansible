---
- name: Skapar .env-fil
  ansible.builtin.template:
    src: env.j2
    dest: "{{ keycloak_auth_working_dir }}/.env"
    owner: "{{ podman_user }}"
    mode: "0600"
    force: true

- name: Skapar docker-compose.yml
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/docker-compose-keycloak.yml.j2"
    dest: "{{ keycloak_auth_working_dir }}/docker-compose-keycloak.yml"
    owner: "{{ podman_user }}"
    mode: "0644"
    force: true
