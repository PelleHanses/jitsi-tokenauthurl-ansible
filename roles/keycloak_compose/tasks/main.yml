- name: Kopierar .env från Jitsi
  command: "cp {{ remote_working_directory }}/{{ org_name }}/jitsi/.env {{ keycloak_auth_working_dir }}/.env"
  become_user: "{{ podman_user }}"

- name: Skapar docker-compose.yml
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/docker-compose-keycloak.yml.j2"
    dest: "{{ keycloak_auth_working_dir }}/docker-compose-keycloak.yml"
    owner: "{{ podman_user }}"
    mode: "0644"
    force: true
