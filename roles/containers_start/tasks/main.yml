---
- name: Startar containrar - Jitsi
  shell: "{{ container_compose_system }} up -d {{ item.container }} && sleep {{ item.delay }}"
  args:
    chdir: "{{ remote_working_directory }}/{{ org_name }}/jitsi"
  loop:
    - { container: "{{ jitsi_prosody_info }}", delay: 10 }  # Först – alla andra beroende på den
    - { container: "{{ jitsi_jicofo_info }}",  delay: 5  }  # Behöver Prosody
    - { container: "{{ jitsi_jvb_info }}",     delay: 5  }  # Behöver Prosody
    - { container: "{{ jitsi_web_info }}",     delay: 4  }  # Sist – fronten
  loop_control:
    label: "{{ item.container }}"
  become_user: "{{ podman_user }}"